name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Check PR author org membership
        id: membership
        env:
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
          # AUTO_BACKPORT_TOKEN has read:org scope — required to call the org
          # membership API. GITHUB_TOKEN (Actions bot) is not an org member and
          # cannot reliably check membership via any GitHub endpoint.
          GH_TOKEN: ${{ secrets.AUTO_BACKPORT_TOKEN }}
        run: |
          case "$AUTHOR_ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "is_member=true" >> "$GITHUB_OUTPUT"
              echo "✅ $AUTHOR_LOGIN has association $AUTHOR_ASSOC — proceeding"
              ;;
            *)
              # author_association only returns MEMBER when the user's org
              # membership is public. GitHub defaults membership to private, so
              # most org members appear as CONTRIBUTOR here. Fall back to a live
              # API call with a read:org token to check actual membership.
              # See: https://github.com/orgs/community/discussions/18690
              STATUS=$(gh api "orgs/scylladb/members/$AUTHOR_LOGIN" \
                --silent -i 2>&1 | head -1 | awk '{print $2}')
              if [ "$STATUS" = "204" ]; then
                echo "is_member=true" >> "$GITHUB_OUTPUT"
                echo "✅ $AUTHOR_LOGIN is a scylladb org member (live check)"
              else
                echo "is_member=false" >> "$GITHUB_OUTPUT"
                echo "❌ $AUTHOR_LOGIN ($AUTHOR_ASSOC) is not a scylladb org member — skipping"
              fi
              ;;
          esac

      - name: Checkout base repository
        if: steps.membership.outputs.is_member == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Always checkout the BASE branch, never the fork's HEAD.
          # pull_request_target runs with base-repo secrets; executing untrusted
          # fork code here would expose them ("pwn request" attack vector).
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - name: Run Claude Code Review
        if: steps.membership.outputs.is_member == 'true'
        id: claude-review
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251  # v1.0.133
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # pass github_token to bypass OIDC federation — the action's federation
          # server rejects OIDC tokens from pull_request_target events (not in its
          # allowlist). Passing github_token directly skips the exchange and uses
          # the workflow token instead. Comments appear from github-actions[bot]
          # rather than claude[bot], but review content is identical.
          # Ref: https://github.com/anthropics/claude-code-action/issues/1348
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: '--model claude-sonnet-4-6'
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          allowed_bots: 'claude,renovate[bot]'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
