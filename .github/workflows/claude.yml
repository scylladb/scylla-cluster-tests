name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Check org membership
        id: membership
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine who triggered this event and their association with the repo.
          # author_association is set by GitHub and indicates the user's relationship
          # to the repository — OWNER, MEMBER, or COLLABORATOR mean the user is trusted.
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            ACTOR="${{ github.event.comment.user.login }}"
            ASSOC="${{ github.event.comment.author_association }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            ACTOR="${{ github.event.comment.user.login }}"
            ASSOC="${{ github.event.comment.author_association }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            ACTOR="${{ github.event.review.user.login }}"
            ASSOC="${{ github.event.review.author_association }}"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            ACTOR="${{ github.event.issue.user.login }}"
            ASSOC="${{ github.event.issue.author_association }}"
          else
            ACTOR="${{ github.actor }}"
            ASSOC="NONE"
          fi
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"

          # Allow org members, repo owners, and collaborators
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "is_member=true" >> "$GITHUB_OUTPUT"
              echo "✅ $ACTOR has association $ASSOC — proceeding"
              ;;
            *)
              echo "is_member=false" >> "$GITHUB_OUTPUT"
              echo "❌ $ACTOR has association $ASSOC — not authorized"
              ;;
          esac

      - name: Post denial comment
        if: steps.membership.outputs.is_member != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine the issue/PR number for the comment
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            NUMBER="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            NUMBER="${{ github.event.issue.number }}"
          fi

          if [ -n "$NUMBER" ]; then
            gh issue comment "$NUMBER" \
              --body "⚠️ @${{ steps.membership.outputs.actor }}: \`@claude\` is restricted to scylladb organization members. If you believe this is an error, please contact a repository maintainer."
          fi

      - name: Checkout repository
        if: steps.membership.outputs.is_member == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch fork PR branch
        if: |
          steps.membership.outputs.is_member == 'true' && (
            (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
            github.event_name == 'pull_request_review_comment' ||
            github.event_name == 'pull_request_review'
          )
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine PR number based on event type
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER=${{ github.event.issue.number }}
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi

          # Get the fork's clone URL and head branch name
          PR_JSON=$(gh pr view "$PR_NUMBER" --json headRefName,headRepository,headRepositoryOwner)
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')
          HEAD_OWNER=$(echo "$PR_JSON" | jq -r '.headRepositoryOwner.login')
          HEAD_REPO=$(echo "$PR_JSON" | jq -r '.headRepository.name')
          ORIGIN_OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)

          # If the PR is from a fork, redirect origin fetch URL to the fork
          # so that claude-code-action's internal "git fetch origin <branch>" succeeds.
          # Keep push URL pointing at the base repo for branch creation.
          if [ "$HEAD_OWNER" != "$ORIGIN_OWNER" ]; then
            echo "PR #$PR_NUMBER is from fork $HEAD_OWNER/$HEAD_REPO, fetching branch $HEAD_REF"
            ORIGIN_URL=$(git remote get-url origin)
            git remote set-url origin "https://github.com/$HEAD_OWNER/$HEAD_REPO.git"
            git config remote.origin.pushurl "$ORIGIN_URL"
          fi

      - name: Run Claude Code
        if: steps.membership.outputs.is_member == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'
