# OCI Configuration Defaults
# This file contains default settings for OCI backend deployments

instance_provision: 'on_demand'
user_credentials_path: '~/.ssh/scylla_test_id_ed25519'

# OCI Region Configuration
oci_region_name:
  - us-ashburn-1

# Availability Zone (required for OCI)
availability_zone: ''

# Instance Types
oci_instance_type_db: ''
oci_instance_type_loader: ''
oci_instance_type_monitor: ''

# Image Configuration
oci_image_db: ''
oci_image_loader: ''
oci_image_monitor: ''

# Image Username
oci_image_username: 'ubuntu'

# Root Disk Size (GB)
root_disk_size_db: 30
root_disk_size_loader: 20
root_disk_size_monitor: 50

# Preinstalled Scylla
use_preinstalled_scylla: true

# Backup Configuration
backup_bucket_backend: 'oci'
backup_bucket_location: ''

# Data Volume Configuration
data_volume_disk_num: 0
data_volume_disk_type: ''
data_volume_disk_size: 500

# Monitor Branch
monitor_branch: null
