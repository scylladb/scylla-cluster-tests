test_duration: 60

prepare_write_cmd:
  - >-
    latte run --function insert --threads 4 --duration 50000 data_dir/latte/vector_search/vector_search_perf_preload.rn

stress_cmd:
  - >-
    latte run --function execute_read_query --connections 2 data_dir/latte/vector_search/vector_search_perf_run.rn
  - >-
    latte run --function=write --tag=background-write --rate=40664
    -P replication_factor=3 --threads=7 --concurrency=21 --consistency=QUORUM
    -P column_size=128 -P column_count=8 -P row_count=650000000 -P offset=0
    --sampling=10s --retry-number=10 --retry-interval='500ms,5s' --request-timeout=60
    -P gauss_mean=325000000 -P gauss_stddev=9750000
    data_dir/latte/latte_cs_alike.rn

instance_type_loader: 'c6i.2xlarge'
instance_type_db: 'i4i.large'

scylla_version: master:latest
# ami_id_vector_store: vector-store-1-4-0-amd64-2026-01-20t09-48-49z # x64
ami_id_vector_store: vector-store-1-5-1-arm64-2026-04-01t12-08-05z #arm
enable_argus: true
use_mgmt: false
n_vector_store_nodes: 1
n_loaders: 1
n_db_nodes: 1
use_hdrhistogram: true
vs_service_level: 200
vs_query_per_seconds: 50
vs_concurrency: [2, 20, 200]
vs_concurrency_time: 5

download_from_s3:
  - data_dir/latte/vector_search:
     - 's3://vector-search-sct/'
