test_duration: 300

stress_cmd:
  - >-
    cassandra-stress write n=42000000 cl=QUORUM -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)'
    -mode cql3 native -rate threads=100 -col 'n=FIXED(10) size=FIXED(900)' -pop seq=1..42000000 -log interval=5

stress_read_cmd:
  - >-
    cassandra-stress read cl=QUORUM duration=150m -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)'
    -mode cql3 native -rate threads=10 -col 'n=FIXED(10) size=FIXED(900)' -pop seq=1..42000000 -log interval=5

n_db_nodes: 3
sizing_db:  # no OCI match (DenseIO min 16 vCPUs)
  vcpu: 2
  memory: '>=16'
sizing_loader:
  vcpu: 2
  memory: '>=16'
n_loaders: 1
n_vector_store_nodes: 2

user_prefix: 'vector-search-xcloud-scale-out'
