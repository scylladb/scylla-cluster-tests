test_duration: 500
test_metadata:
  description: >-
    Gemini fuzz test comparing a 3-node Scylla cluster against an oracle DB under
    mixed load for ~3h of active stress, with a non-disruptive SisyphusMonkey
    nemesis subset (excluding disruptive disruptions) to validate consistency
    without hard node failures.
  test_type: gemini
  tier: tier1
  duration_class: medium
  supported_backends:
    - aws
  stress_tools:
    - gemini
  workload: mixed
  team_ownership: qa-tools
n_db_nodes: 3
n_test_oracle_db_nodes: 1
n_loaders: 1
sizing_db:  # no OCI match (min 16 vCPUs in OCI catalog)
  vcpu: 4
  memory: '>=32'
  arch: x86_64
sizing_loader:
  vcpu: 4
  memory: '>=16'

user_prefix: 'gemini-basic-3h'

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: "not disruptive"

gemini_cmd: |
  --duration 3h
  --concurrency 50
  --mode mixed

gemini_log_cql_statements: true

db_type: mixed_scylla
