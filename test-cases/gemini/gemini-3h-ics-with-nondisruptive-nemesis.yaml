test_duration: 500
n_db_nodes: 6
n_test_oracle_db_nodes: 1
n_loaders: 1
instance_type_db: 'i7i.large'
instance_type_loader: 'c7i.large'

user_prefix: 'ics-gemini-nemesis-3h'
ami_db_scylla_user: 'centos'

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: "not disruptive and not enospc"

gemini_cmd: |
  --duration 3h
  --concurrency 50
  --mode write

gemini_table_options:
  - "compaction={'class': 'IncrementalCompactionStrategy'}"
gemini_log_cql_statements: true

db_type: mixed_scylla
