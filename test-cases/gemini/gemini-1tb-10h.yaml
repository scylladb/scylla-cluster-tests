test_duration: 780
n_db_nodes: 6
n_test_oracle_db_nodes: 1
n_loaders: 1
instance_type_db: 'i7i.2xlarge'
instance_type_loader: 'm7i.xlarge'

user_prefix: 'gemini-1tb-10h'

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: 'not enospc and not IsolateNodeWithIptableRuleNemesis and not IsolateNodeWithProcessSignalNemesis'
nemesis_seed: '041'

gemini_cmd: |
  --duration 8h
  --concurrency 50
  --mode mixed
  --io-worker-pool 2048

gemini_log_cql_statements: true

db_type: mixed_scylla
