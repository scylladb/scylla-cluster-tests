test_duration: 780
test_metadata:
  description: >-
    Large-scale Gemini fuzz test comparing a 6-node mixed Scylla/oracle cluster
    against a 1TB dataset, running ~8h of active Gemini stress with a large
    IO-worker pool and SisyphusMonkey nemesis (excluding ENOSPC and
    node-isolation disruptions), to validate data consistency under sustained
    mixed load and chaos at scale.
  test_type: gemini
  tier: tier1
  duration_class: medium
  supported_backends:
    - aws
  stress_tools:
    - gemini
  workload: mixed
  team_ownership: qa-tools
n_db_nodes: 6
n_test_oracle_db_nodes: 1
n_loaders: 1
sizing_db:  # no OCI match (min 16 vCPUs in OCI catalog)
  vcpu: 8
  memory: '>=64'
  arch: x86_64
sizing_loader:
  vcpu: 4
  memory: '>=16'

user_prefix: 'gemini-1tb-10h'

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: 'not enospc and not IsolateNodeWithIptableRuleNemesis and not IsolateNodeWithProcessSignalNemesis'
nemesis_seed: '041'

gemini_cmd: |
  --duration 8h
  --concurrency 50
  --mode mixed
  --io-worker-pool 2048

gemini_log_cql_statements: true

db_type: mixed_scylla
