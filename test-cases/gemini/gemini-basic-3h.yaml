test_duration: 500
test_metadata:
  description: >-
    Baseline Gemini fuzz test (no nemesis) comparing a 3-node Scylla cluster
    against an oracle DB over ~3h of mixed read/write load, establishing a
    consistency baseline without chaos disruptions. Also run on OCI via the
    configurations/oci/gemini-basic-3h.yaml sizing overlay.
  test_type: gemini
  tier: tier1
  duration_class: medium
  supported_backends:
    - aws
    - oci
  stress_tools:
    - gemini
  workload: mixed
  team_ownership: qa-tools
n_db_nodes: 3
n_test_oracle_db_nodes: 1
n_loaders: 1
sizing_db:  # no OCI match (min 16 vCPUs in OCI catalog)
  vcpu: 2
  memory: '>=16'
  arch: x86_64
sizing_loader:
  vcpu: 2
  memory: '>=8'

user_prefix: 'gemini-basic-3h'

gemini_cmd: |
  --duration 3h
  --concurrency 50
  --mode mixed
  --io-worker-pool 2048

gemini_log_cql_statements: true

db_type: mixed_scylla
