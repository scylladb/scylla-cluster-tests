test_duration: 500
n_db_nodes: 6
n_test_oracle_db_nodes: 1
n_loaders: 1
sizing_db:  # no GCE/Azure/OCI match (12 vCPU tier unavailable on those clouds)
  vcpu: 12
  memory: '>=96'
  arch: x86_64
  local_disk_gb: '>=6000'  # ~80% of i3en.3xlarge's 7500GB
sizing_loader:
  vcpu: 16
  memory: '>=32'

user_prefix: 'gemini-8h-large-num-columns'

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: 'not enospc and not IsolateNodeWithIptableRuleNemesis and not IsolateNodeWithProcessSignalNemesis'
nemesis_seed: '023'

gemini_cmd: |
  --duration 7h
  --concurrency 10
  --mode mixed
  --max-partition-keys 12
  --min-partition-keys 8
  --max-clustering-keys 20
  --min-clustering-keys 12
  --max-columns 100 --min-columns 80
  --verbose

gemini_log_cql_statements: true

db_type: scylla
