test_duration: 30
test_metadata:
  description: >-
    Short Gemini fuzz test on AWS comparing Scylla against a Cassandra 4.1 oracle
    cluster with a small schema (3 tables, 8 columns) over ~20 minutes, validating
    Scylla/Cassandra semantic compatibility with no nemesis.
  test_type: gemini
  tier: ondemand
  duration_class: short
  supported_backends:
    - aws
  stress_tools:
    - gemini
  workload: mixed
  team_ownership: qa-tools
n_db_nodes: 3
n_test_oracle_db_nodes: 1
n_loaders: 1
sizing_db:  # no OCI match (min 16 vCPUs in OCI catalog)
  vcpu: 4
  memory: '>=32'
  arch: x86_64
sizing_db_oracle:  # no OCI match (min 16 vCPUs in OCI catalog)
  vcpu: 4
  memory: '>=32'
  arch: x86_64
sizing_loader:
  vcpu: 4
  memory: '>=16'

db_type: mixed_cassandra
cassandra_oracle_version: '4.1'
ami_id_db_cassandra: ''  # falls back to loader AMI (Ubuntu)

user_prefix: 'gemini-cs-oracle-aws'

run_commit_log_check_thread: false

gemini_cmd: |
  --duration 20m
  --warmup 2m
  --concurrency 10
  --mode mixed
  --max-tables 3
  --max-columns 8
  --max-partition-keys 3
  --max-clustering-keys 3
