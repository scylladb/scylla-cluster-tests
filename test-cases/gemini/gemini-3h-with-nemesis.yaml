test_duration: 300
test_metadata:
  description: >-
    Standard Gemini fuzz test comparing a 6-node Scylla cluster against an oracle
    DB under mixed read/write load for ~3h, with the full SisyphusMonkey nemesis
    set (excluding ENOSPC and node-isolation disruptions) to validate consistency
    under chaos.
  test_type: gemini
  tier: tier1
  duration_class: short
  supported_backends:
    - aws
  stress_tools:
    - gemini
  workload: mixed
  team_ownership: qa-tools
n_db_nodes: 6
n_test_oracle_db_nodes: 1
n_loaders: 1
sizing_db:  # no OCI match (min 16 vCPUs in OCI catalog)
  vcpu: 2
  memory: '>=16'
  arch: x86_64
sizing_loader:
  vcpu: 2
  memory: '>=8'

user_prefix: 'gemini-with-nemesis-3h-normal'

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: 'not enospc and not IsolateNodeWithIptableRuleNemesis and not IsolateNodeWithProcessSignalNemesis'
nemesis_seed: '032'

gemini_cmd: |
  --duration 3h
  --concurrency 50
  --mode mixed

gemini_log_cql_statements: true

db_type: mixed_scylla
