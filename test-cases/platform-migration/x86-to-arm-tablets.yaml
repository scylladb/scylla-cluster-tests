test_duration: 60

instance_type_db: 'i7i.2xlarge'
instance_type_db_target: 'i8g.2xlarge'
n_db_nodes: 3

prepare_write_cmd: "cassandra-stress write cl=QUORUM n=1000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=50 -pop seq=1..1000000"

stress_cmd: "cassandra-stress mixed 'ratio(write=1,read=3)' cl=QUORUM duration=30m -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=20 -pop seq=1..1000000"

n_loaders: 1
n_monitor_nodes: 1

nemesis_class_name: 'NoOpMonkey'

user_prefix: 'platform-migration'

use_preinstalled_scylla: true
