test_duration: 5
n_db_nodes: 1
n_loaders: 1
n_monitor_nodes: 0

# Debug logging generates large logs without overwhelming startup
append_scylla_args: '--logger-log-level=storage_service=debug:compaction_manager=debug:sstable=debug'

stress_cmd:
  - "cassandra-stress write n=500000 cl=ONE -mode cql3 native -rate threads=10"

user_prefix: 'PR-test-log-collection'
