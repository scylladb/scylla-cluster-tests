test_duration: 180

stress_cmd:
  - >-
    latte run --function insert --duration 200000 data_dir/latte/mgmt_data_validation.rn

stress_read_cmd:
  - >-
    latte run --function validate --duration 200000 data_dir/latte/mgmt_data_validation.rn

