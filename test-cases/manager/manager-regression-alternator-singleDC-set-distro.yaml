# Enable (also in stress_cmds) when support for features is added:
# https://github.com/scylladb/scylla-manager/issues/4513
alternator_table_name: 'usertable_backup' # add ".-A-Z" when works
# https://github.com/scylladb/scylla-manager/issues/4514
#alternator_table_lsi_name: 'lsi'
# https://github.com/scylladb/scylla-manager/issues/4515
#alternator_table_gsi_name: 'gsi'
alternator_table_tags:
    key1: value1

test_duration: 240

round_robin: true

stress_cmd:
    bin/ycsb load dynamodb -P workloads/workloadc -p table=usertable_backup -p dynamodb.ttlKey=TTL -p dynamodb.ttlDuration=86400
    -p requestdistribution=sequential -p insertorder=ordered -p insertstart=0 -p dataintegrity=true -p fieldlengthdistribution=constant

stress_read_cmd: [
    "bin/ycsb run dynamodb -P workloads/workloadc -p table=usertable_backup -p dynamodb.ttlKey=TTL -p dynamodb.ttlDuration=86400
    -p requestdistribution=sequential -p insertorder=ordered -p insertstart=0 -p dataintegrity=true -p fieldlengthdistribution=constant",
# 1. no scylla API allowing for waiting for all view updates to finish - at the end of restore procedure LSIs might still be incomplete
# 2. requires: https://github.com/scylladb/YCSB/pull/20
#    "bin/ycsb run dynamodb -P workloads/workloadc -p table=usertable_BACKUP:gsi
#    -p requestdistribution=sequential -p insertorder=ordered -p insertstart=0 -p dataintegrity=true -p fieldlengthdistribution=constant",
#    "bin/ycsb run dynamodb -P workloads/workloadc -p table=usertable_BACKUP:lsi
#    -p requestdistribution=sequential -p insertorder=ordered -p insertstart=0 -p dataintegrity=true -p fieldlengthdistribution=constant",
]

alternator_port: '8080'
dynamodb_primarykey_type: HASH_AND_RANGE

# https://github.com/scylladb/scylla-manager/issues/4510
# alternator_enforce_authorization: true
# alternator_access_key_id: 'alternator'
# alternator_secret_access_key: 'password'
# authenticator: 'PasswordAuthenticator'
# authenticator_user: cassandra
# authenticator_password: cassandra
# authorizer: 'CassandraAuthorizer'

instance_type_db: 'i4i.large'
instance_type_loader: 'c6i.large'

region_name: 'us-east-1'
n_db_nodes: '3'
n_loaders: 1

client_encrypt: true

post_behavior_db_nodes: "destroy"
post_behavior_loader_nodes: "destroy"
post_behavior_monitor_nodes: "destroy"

user_prefix: manager-regression
space_node_threshold: 6442

aws_instance_profile_name_db: 'qa-scylla-manager-backup-instance-profile'
