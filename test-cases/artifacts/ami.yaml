root_disk_size_db: 50
test_metadata:
  description: >-
    Artifacts validation test that provisions a single Scylla node from an AWS AMI,
    verifies the package installs correctly, and runs basic smoke checks. No load
    generation — validates the artifact itself, not cluster behavior.
  test_type: artifacts
  tier: sanity
  duration_class: short
  supported_backends:
    - aws
  stress_tools: []
  nemesis_labels:
    - NoOpMonkey
backtrace_decoding: false
cluster_backend: 'aws'
instance_type_db: 'i4i.large'
instance_provision: "spot"
instance_provision_fallback_on_demand: true
n_db_nodes: 1
n_loaders: 0
n_monitor_nodes: 0
nemesis_class_name: 'NoOpMonkey'
region_name: 'us-east-1'
scylla_linux_distro: 'centos'
test_duration: 60
user_prefix: 'artifacts-ami'
fallback_to_next_availability_zone: true
