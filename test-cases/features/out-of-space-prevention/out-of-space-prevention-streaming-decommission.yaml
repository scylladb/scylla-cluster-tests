test_duration: 720
prepare_write_cmd: [
  "cassandra-stress write no-warmup cl=QUORUM n=240000000 -schema keyspace=keyspace1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=200' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1..240000000",
  "cassandra-stress write no-warmup cl=QUORUM n=240000000 -schema keyspace=keyspace1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=200' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=240000001..480000000",
  "cassandra-stress write no-warmup cl=QUORUM n=240000000 -schema keyspace=keyspace1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=200' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=480000001..720000000",
]

n_db_nodes: 6
simulated_racks: 3
instance_type_db: 'i4i.large'

n_loaders: 3
instance_type_loader: 'c6i.large'

n_monitor_nodes: 1
instance_type_monitor: 't3.large'

user_prefix: 'oos-test'

round_robin: true
append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
backtrace_decoding: false
print_kernel_callstack: true
