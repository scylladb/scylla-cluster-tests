# Longevity test: asymmetric cluster – 12 h authorization + LimitedMonkey
#
# Dataset:
#   - Prepare:      450M rows (2 loaders × 225M rows in parallel, ~1h15m)
#   - Stress write: 150M rows  (Loader 1, throttled 30k ops/s)
#   - Stress read:  seq 1..450M (Loader 2, throttled 30k ops/s)
#   - Total:        600M rows × ~1 KB per row ≈ ~600 GB logical (single replica basis)
#
# Disk utilization targets (RF=3, 12 nodes, 1 KB/row):
#   - Prepare:             ~30%  (GCE: ~112 GB / 375 GB NVMe, 1× local SSD)
#                                (AWS: ~12%,  ~112 GB / 937 GB NVMe, i7i.xlarge)
#   - Stress write:       +~40%  (GCE: +10%, ~150 GB / 375 GB)
#                                (AWS: +4%,  ~150 GB / 937 GB)
#   - Load: 30–70%  (write 30k ops/s + read 30k ops/s = 60k ops/s total)

test_duration: 750

prepare_write_cmd:
  - "cql-stress-cassandra-stress write cl=ALL n=225000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3) compaction(strategy=LeveledCompactionStrategy)' -mode cql3 native -rate threads=500 -col 'size=FIXED(256) n=FIXED(4)' -pop seq=1..225000000 -log interval=15"
  - "cql-stress-cassandra-stress write cl=ALL n=225000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3) compaction(strategy=LeveledCompactionStrategy)' -mode cql3 native -rate threads=500 -col 'size=FIXED(256) n=FIXED(4)' -pop seq=225000001..450000000 -log interval=15"

stress_cmd: ["cql-stress-cassandra-stress write cl=QUORUM duration=11h -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3) compaction(strategy=LeveledCompactionStrategy)' -mode cql3 native -rate 'threads=200 throttle=30000/s' -col 'size=FIXED(256) n=FIXED(4)' -pop seq=450000001..600000000 -log interval=15",
             "cql-stress-cassandra-stress read cl=QUORUM duration=11h -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3) compaction(strategy=LeveledCompactionStrategy)' -mode cql3 native -rate 'threads=200 throttle=30000/s' -col 'size=FIXED(256) n=FIXED(4)' -pop seq=1..450000000 -log interval=5"]

run_fullscan: ['{"mode": "table_and_aggregate", "ks_cf": "keyspace1.standard1", "interval": 5}']

n_db_nodes: 12
n_loaders: 2
simulated_racks: 3
round_robin: true

instance_type_db: 'i7i.2xlarge'
instance_type_loader: 'c6i.large'

gce_instance_type_db: 'n2-highmem-8'
gce_instance_type_loader: 'e2-standard-2'
gce_n_local_ssd_disk_db: 1

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: 'limited'
nemesis_interval: 30
nemesis_during_prepare: false

user_prefix: 'longevity-12nodes-12h'

space_node_threshold: 322122547

server_encrypt: true
client_encrypt: true

use_preinstalled_scylla: true
