test_duration: 420

latte_schema_parameters:
  lwt: 'true'
  cdc: 'false'
  mv: 'true'
  ks_name: 'base_keyspace'
  table_name: 'base_table'
  mv_name: 'mv_for_base_table'

prepare_write_cmd:
  - >-
    latte run -f write_lwt_table -P rows_per_partition=10000 -P rows=5000000 --rate 2500 --duration=5000000 --start-cycle 0 --tag write-1
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f write_to_table -P rows_per_partition=20000 -P rows=50000000 --rate 2500 --duration=5000000 -P offset=5000000 --tag write-2
    data_dir/latte/tablet_split_merge_load.rn

stress_cmd:
  - >-
    latte run -f update_first_part_of_table --serial-consistency=LOCAL_SERIAL --threads=1 --rate=50 --concurrency=100 --duration=360m --tag update-first-part
    -P rows_per_partition=10000 -P rows=5000000
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f update_second_part_of_table --serial-consistency=LOCAL_SERIAL --threads=1 --rate=50 --concurrency=100 --duration=360m --tag update-second-part
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    -P rows_per_partition=10000 -P rows=5000000 -P offset=2500000
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_table --consistency=LOCAL_SERIAL --threads=1 --rate=80 --concurrency=50 --duration=360m --tag read-from-table
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    -P rows_per_partition=10000 -P rows=5000000
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f delete_partition -P delete_pct=75 --rate 2  --concurrency=10 --duration=360m --tag delete-partition
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    -P rows_per_partition=10000 -P rows=5000000
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_mv --consistency=QUORUM --threads=1 --rate=40 --concurrency=20 --duration=360m --tag read-from-mv
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    -P rows_per_partition=10000 -P rows=5000000
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_mv_notcol --consistency=QUORUM --threads=1 --rate=40 --concurrency=20 --duration=360m --tag read-from-mv-notcolctd
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    -P rows_per_partition=10000 -P rows=5000000 -P offset=2500000
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f "update_or_delete_by_cycle" --consistency=QUORUM --concurrency 100 --threads=100 --rate=5000 --duration=720m --tag update-or-delete-by-cycle
    --request-timeout=900s --retry-number=50 --retry-interval=1s,30s
    -P rows_per_partition=10 -P offset=50000000 -P rows=50000000
    -P update_cycles=5 -P read_cycles=3 -P delete_cycles=1
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f "update_or_delete_by_cycle" --consistency=QUORUM --concurrency 100 --threads=100 --rate=5000 --duration=720m --tag update-or-delete-by-cycle
    --request-timeout=900s --retry-number=50 --retry-interval=1s,30s
    -P rows_per_partition=10 -P offset=100000000 -P rows=50000000
    -P update_cycles=5 -P read_cycles=3 -P delete_cycles=1
    data_dir/latte/tablet_split_merge_load.rn


n_db_nodes: 6
simulated_racks: 3
n_loaders: 2
round_robin: true

instance_type_db: 'i4i.4xlarge'
gce_instance_type_db: 'n2-highmem-8'
gce_n_local_ssd_disk_db: 8

nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: ["schema_changes and not disruptive"]
nemesis_seed: '021'
nemesis_during_prepare: false
space_node_threshold: 64424

user_prefix: 'longevity-mv-24h'

use_preinstalled_scylla: true

append_scylla_yaml:
  rf_rack_valid_keyspaces: true

append_scylla_args: '--logger-log-level table=debug'
