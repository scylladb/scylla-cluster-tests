test_duration: 3600
stress_duration: 60

prepare_write_cmd:
  - >-
    latte run
    -f myinsert
    -P rows=10000000
    -P replication_factor=3
    --rate 50000
    test-cases/longevity/lwt_and_tablet.rn



stress_cmd:
  - >-
    latte run -f lwt_upd_one --threads=20 --concurrency=60 --duration=80m
    test-cases/longevity/lwt_and_tablet.rn

  - >-
    latte run -f lwt_upd_two --threads=20 --concurrency=60 --duration=80m
    test-cases/longevity/lwt_and_tablet.rn

  - >-
    latte run -f lwt_read --consistency=QUORUM --threads=20 --concurrency=60 --duration=80m
    test-cases/longevity/lwt_and_tablet.rn

  - >-
    latte run -f delete_partitions -P delete_ratio=0.5 --duration=80m
    test-cases/longevity/lwt_and_tablet.rn

# TODO more flexible deletion
#  - >-
#    latte run -f delete_partitions --threads 10 --concurrency 30  --rate 20000 --duration 80m
#    test-cases/longevity/lwt_and_tablet.rn



#use_mgmt: false
#enable_argus: false
store_perf_results: true


n_db_nodes: 6
#simulated_racks: 3
n_loaders: 5
round_robin: true

instance_type_db: 'i4i.2xlarge'
gce_instance_type_db: 'n2-highmem-8'
gce_n_local_ssd_disk_db: 8

#nemesis_class_name: 'NoOpMonkey'
nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: ["topology_changes", "schema_changes and not disruptive"]
nemesis_seed: '021'
nemesis_during_prepare: false
space_node_threshold: 64424

user_prefix: 'longevity-lwt-24h'

use_preinstalled_scylla: true
