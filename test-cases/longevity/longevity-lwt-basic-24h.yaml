test_duration: 360

prepare_write_cmd:
  - >-
    latte run
    -f lwt_insert
    -P rows_per_partition=1000 \
    -P partition_sizes="\"100:1\""
    --rate 50000
    --duration=10000000
    data_dir/latte/lwt_load.rn



stress_cmd:
  # TODO: what loader instance should be used? Its not clear needs to be clarified
  - >-
    latte run -f lwt_upd_one --threads=7 --concurrency=128 --duration=80m
    data_dir/latte/lwt_load.rn

  - >-
    latte run -f lwt_upd_two --threads=7 --concurrency=128 --duration=80m
    data_dir/latte/lwt_load.rn

  - >-
    latte run -f lwt_read --consistency=QUORUM --threads=7 --concurrency=128 --duration=80m
    data_dir/latte/lwt_load.rn

  - >-
    latte run -f lwt_delete_partitions -P delete_pct=50 --duration=80m
    data_dir/latte/lwt_load.rn

# TODO more flexible deletion and SERIAL consistency
#  - >-
#    latte run -f delete_partitions --threads 10 --concurrency 30  --rate 20000 --duration 80m
#    test-cases/longevity/lwt_and_tablet.rn



#use_mgmt: false
#enable_argus: false
store_perf_results: true


n_db_nodes: 6
#simulated_racks: 3
n_loaders: 4
round_robin: true

instance_type_db: 'i4i.large'
gce_instance_type_db: 'n2-highmem-8'
gce_n_local_ssd_disk_db: 8

#nemesis_class_name: 'NoOpMonkey'
nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: ["topology_changes", "schema_changes and not disruptive"]
nemesis_seed: '021'
nemesis_during_prepare: false
space_node_threshold: 64424

user_prefix: 'longevity-lwt-24h'

use_preinstalled_scylla: true
