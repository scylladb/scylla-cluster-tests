test_duration: 255
test_metadata:
  description: >-
    Basic longevity test running cassandra-stress write workload at QUORUM consistency
    for ~4 hours on a 6-node single-DC cluster with SisyphusMonkey nemesis. Validates
    cluster stability under moderate write load with continuous chaos operations.
  test_type: longevity
  tier: tier1
  duration_class: short
  supported_backends:
    - aws
    - gce
    - azure
  stress_tools:
    - cassandra-stress
  workload: write
  nemesis_labels:
    - SisyphusMonkey
stress_cmd: ["cassandra-stress write cl=QUORUM duration=180m -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3) compaction(strategy=SizeTieredCompactionStrategy)' -mode cql3 native -rate threads=1000 -pop seq=1..10000000 -log interval=5"
             ]

n_db_nodes: 6
n_loaders: 2
argus_use_ssh_tunnel: true

instance_type_db: 'i4i.2xlarge'
gce_instance_type_db: 'n2-highmem-16'
gce_instance_type_loader: 'e2-standard-4'
azure_instance_type_db: 'Standard_L8s_v4'
run_fullscan: ['{"mode": "table_and_aggregate", "ks_cf": "keyspace1.standard1", "interval": 10}']
nemesis_class_name: 'SisyphusMonkey'
nemesis_seed: '111'
nemesis_interval: 2

user_prefix: 'longevity-10gb-3h'
space_node_threshold: 64424

client_encrypt: true

gce_n_local_ssd_disk_db: 2
run_db_node_benchmarks: false
