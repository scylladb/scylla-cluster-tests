test_duration: 420

latte_schema_parameters:
  lwt: 'false'
  cdc: 'false'
  mv: 'false'
  ks_name: 'cdc_keyspace'
  table_name: 'cdc_table'

prepare_write_cmd:
  - >-
    latte run -f write_to_table -P rows_per_partition=10 -P rows=5000000
    --duration=250000 --concurrency=1000 --rate=2500 --start-cycle 0 --tag write-1
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f write_to_table -P rows_per_partition=10 -P offset=5000000 -P rows=5000000
    --duration=250000 --concurrency=1000 --rate=2500 --start-cycle 500000001 --tag write-2
    data_dir/latte/tablet_split_merge_load.rn

stress_cmd:
  - >-
    latte run -f "update_or_delete_by_cycle" --consistency=QUORUM --concurrency 100 --threads=50 --rate=25000 --duration=360m --tag update-or-delete-by-cycle
    --request-timeout=900s --retry-number=50 --retry-interval=1s,30s
    -P offset=10000000 -P rows=50000000
    -P update_cycles=6 -P read_cycles=6 -P delete_cycles=1
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f "update_or_delete_by_cycle" --consistency=QUORUM --concurrency 100 --threads=50 --rate=25000 --duration=360m --tag update-or-delete-by-cycle
    --request-timeout=900s --retry-number=50 --retry-interval=1s,30s
    -P offset=100000000 -P rows=50000000
    -P update_cycles=6 -P read_cycles=6 -P delete_cycles=1
    data_dir/latte/tablet_split_merge_load.rn


db_type: mixed_scylla

n_db_nodes: 6
simulated_racks: 3
n_loaders: 2
round_robin: true

instance_type_db: 'i4i.2xlarge'
gce_instance_type_db: 'n2-highmem-8'
gce_n_local_ssd_disk_db: 8

n_test_oracle_db_nodes: 3
instance_type_db_oracle: 'i4i.2xlarge'
oracle_scylla_version: '2025.4.0'


nemesis_class_name: 'SisyphusMonkey'
nemesis_selector: ["schema_changes and not disruptive"]
nemesis_seed: '021'
nemesis_during_prepare: false
space_node_threshold: 64424

user_prefix: 'longevity-cdc-24h'

use_preinstalled_scylla: true

append_scylla_args: '--logger-log-level table=debug'
