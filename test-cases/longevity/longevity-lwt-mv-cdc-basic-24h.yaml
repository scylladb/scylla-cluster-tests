test_duration: 420

latte_schema_parameters:
  lwt: 'true'
  cdc: 'true'
  mv: 'true'
  ks_name: 'base_keyspace'
  table_name: 'base_table'
  mv_name: 'mv_for_base_table'

prepare_write_cmd:
  - >-
    latte run -f write_lwt_table -P rows=5000000
    --duration=2500000 --concurrency=100 --rate=10000 --threads=100 --tag write-1
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f write_to_table -P rows_per_partition=25 -P offset=50000000 -P rows=50000000
    --duration=25000000 --concurrency=100 --rate=10000 --threads=100 --tag write-2
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

stress_cmd:
  - >-
    latte run -f update_first_part_of_table --serial-consistency=LOCAL_SERIAL
    -P rows=5000000
    --threads=1 --rate=50 --concurrency=50 --duration=360m --tag update-first-part
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f update_second_part_of_table --serial-consistency=LOCAL_SERIAL
    -P rows=5000000
    --threads=1 --rate=50 --concurrency=50 --duration=360m --tag update-second-part
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_table --consistency=LOCAL_SERIAL
    -P rows=5000000
    --threads=1 --rate=250 --concurrency=50 --duration=360m --tag read-from-table
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_table --consistency=QUORUM
    -P rows_per_partition=25 -P rows=50000000 -P offset=50000000
    --threads=1 --rate=250 --concurrency=50 --duration=360m --tag read-from-table
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f delete_partition -P delete_pct=75 --rate 10  --concurrency=10 --duration=360m --tag delete-partition
    -P rows_per_partition=25 -P rows=5000000
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_mv --consistency=QUORUM --threads=1 --rate=40 --concurrency=50 --duration=360m --tag read-from-mv
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    -P rows_per_partition=25 -P rows=50000000
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_mv_notcol --consistency=QUORUM --threads=1 --rate=40 --concurrency=50 --duration=360m --tag read-from-mv-notcolctd
    --request-timeout 900s --retry-number 50 --retry-interval 1s,30s
    -P rows_per_partition=25 -P rows=50000000 -P offset=50000000
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f "update_or_delete_by_cycle" --consistency=QUORUM --concurrency 100 --threads=100 --rate=5000 --duration=360m --tag update-or-delete-by-cycle
    --request-timeout=900s --retry-number=50 --retry-interval=1s,30s
    -P rows_per_partition=25 -P offset=50000000 -P rows=50000000 -P update_cycles=3
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f "update_or_delete_by_cycle" --consistency=QUORUM --concurrency 100 --threads=100 --rate=5000 --duration=360m --tag update-or-delete-by-cycle
    --request-timeout=900s --retry-number=50 --retry-interval=1s,30s
    -P rows_per_partition=25 -P offset=75000000 -P rows=50000000 -P update_cycles=3
    data_dir/latte/tablet_split_merge_load.rn

db_type: mixed_scylla

n_db_nodes: 6
simulated_racks: 3
n_loaders: 4
round_robin: true

instance_type_db: 'i4i.4xlarge'
gce_instance_type_db: 'n2-highmem-8'
gce_n_local_ssd_disk_db: 8

n_test_oracle_db_nodes: 3
instance_type_db_oracle: 'i4i.2xlarge'
oracle_scylla_version: '2025.4.0'

nemesis_class_name: 'SplitMergeTabletsWithAlter:1 SisyphusMonkey:1'
nemesis_selector: ["", "topology_changes"]
nemesis_seed: '021'
nemesis_during_prepare: false
space_node_threshold: 64424

user_prefix: 'longevity-lwt-mv-cdc-24h'

use_preinstalled_scylla: true

append_scylla_yaml:
  rf_rack_valid_keyspaces: true

append_scylla_args: '--logger-log-level table=debug'
