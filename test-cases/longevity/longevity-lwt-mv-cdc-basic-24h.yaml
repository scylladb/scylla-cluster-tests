test_duration: 750

db_type: mixed_scylla

n_db_nodes: 6
simulated_racks: 3
n_loaders: 3
round_robin: true

instance_type_db: 'i7i.4xlarge'
gce_instance_type_db: 'n2-highmem-8'
gce_n_local_ssd_disk_db: 8

n_test_oracle_db_nodes: 3
instance_type_db_oracle: 'i7i.2xlarge'
oracle_scylla_version: '2025.4.0'

nemesis_class_name: [SisyphusMonkey, SisyphusMonkey]
nemesis_selector: ["MajorCompactionMonkey", "topology_changes"]
nemesis_interval: 15
nemesis_seed: '021'
nemesis_during_prepare: false
space_node_threshold: 64424

user_prefix: 'longevity-lwt-mv-cdc-24h'

use_preinstalled_scylla: true

append_scylla_yaml:
  rf_rack_valid_keyspaces: true

# Required for TABLET_SPLIT/MERGE event detection in DB logs
append_scylla_args: '--logger-log-level table=debug'
root_disk_size_runner: 500  # need large disk for storing logs with table debug mode

latte_schema_parameters:
  lwt: 'true'
  cdc: 'true'
  mv: 'true'
  ks_name: 'main_keyspace'
  table_name: 'main_table'
  mv_name: 'mv_for_main_table'

prepare_write_cmd:
  - >-
    latte run -f write_to_table --tag write-1
    -P rows=5000000 -P rows_per_partition=1
    --threads=100 --rate=10000 --concurrency=10 --duration=2500000
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f write_to_table --tag write-2
    -P rows=5000000 -P rows_per_partition=1 -P partition_offset=5000000
    --threads=100 --rate=10000 --concurrency=10 --duration=2500000
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f update_or_delete_by_cycle --consistency=QUORUM --tag write3
    -P rows=5000000 -P rows_per_partition=10 -P partition_offset=1000000000
    -P update_cycles=1 -P read_cycles=2 -P delete_cycles=0
    --threads=100 --rate=10000 --concurrency=10 --duration=10000000
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn


stress_cmd:
  - >-
    latte run -f update_first_part_of_table --serial-consistency=LOCAL_SERIAL --tag update-first-part
    -P rows=5000000 -P rows_per_partition=1
    --threads=50 --rate=50 --concurrency=1 --duration=720m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f update_second_part_of_table --serial-consistency=LOCAL_SERIAL --tag update-second-part
    -P rows=5000000 -P rows_per_partition=1 -P partition_offset=5000000
    --threads=50 --rate=50 --concurrency=1 --duration=720m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f delete_partition --consistency=QUORUM --tag delete-partition
    -P rows=5000000 -P rows_per_partition=1 -P delete_pct=75
    --threads=50 --rate=10 --concurrency=1 --duration=720m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_table --consistency=LOCAL_SERIAL --tag read-from-table
    -P rows=5000000 -P rows_per_partition=1
    --threads=50 --rate=250 --concurrency=1 --duration=720m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_table --consistency=QUORUM --tag read-from-table
    -P rows=5000000 -P rows_per_partition=1 -P partition_offset=5000000
    --threads=50 --rate=250 --concurrency=1 --duration=720m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_mv --consistency=QUORUM --tag read-from-mv
    -P rows=5000000 -P rows_per_partition=1
    --threads=40 --rate=40 --concurrency=1 --duration=720m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f read_from_mv_notcol --consistency=QUORUM --tag read-from-mv-notcolctd
    -P rows=5000000 -P rows_per_partition=1 -P partition_offset=5000000
    --threads=40 --rate=40 --concurrency=1 --duration=720m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f update_or_delete_by_cycle --consistency=QUORUM --tag update-or-delete-by-cycle2
    -P rows=5000000 -P rows_per_partition=10 -P partition_offset=1000000000
    -P update_cycles=10 -P read_cycles=20 -P delete_cycles=5
    --threads=10 --rate=10000 --concurrency=1 --duration=360m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn

  - >-
    latte run -f update_or_delete_by_cycle --consistency=QUORUM --tag update-or-delete-by-cycle2
    -P rows=5000000 -P rows_per_partition=10 -P partition_offset=2000000000
    -P update_cycles=10 -P read_cycles=20 -P delete_cycles=5
    --threads=10 --rate=10000 --concurrency=1 --duration=360m
    --request-timeout=900s --retry-number=50 --retry-interval=1s,60s
    data_dir/latte/tablet_split_merge_load.rn
