
# fill the cluster with data
prepare_write_cmd: [
    "cassandra-stress write cl=ALL n=209715200 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=650 -col 'size=FIXED(1024) n=FIXED(1)' -pop seq=1..209715200",
    "cassandra-stress write cl=ALL n=209715200 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=650 -col 'size=FIXED(1024) n=FIXED(1)' -pop seq=209715201..419430400",
    "cassandra-stress write cl=ALL n=209715200 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=650 -col 'size=FIXED(1024) n=FIXED(1)' -pop seq=419430401..629145600",
    "cassandra-stress write cl=ALL n=209715200 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=650 -col 'size=FIXED(1024) n=FIXED(1)' -pop seq=629145601..838860800"
]

# stress command to run
stress_cmd_m: "cassandra-stress mixed cl=QUORUM duration=720m -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=125 fixed=20000/s' -col 'size=FIXED(1024) n=FIXED(1)'"
