jenkinsfiles:
  - path: "jenkins-pipelines/master-triggers/sct_triggers/tier1-custom-time-trigger.jenkinsfile"

# Tier1 trigger matrix — single source of truth for all tier1 job definitions.
#
# Replaces:
#   - jenkins-pipelines/master-triggers/sct_triggers/tier1-custom-time-trigger.xml
#   - jenkins-pipelines/oss/sct_triggers/tier1-aws-custom-time-trigger.xml
#   - jenkins-pipelines/oss/sct_triggers/tier1-azure-custom-time-trigger.xml
#   - jenkins-pipelines/oss/sct_triggers/tier1-gce-custom-time-trigger.xml
#   - jenkins-pipelines/oss/sct_triggers/tier1-aws-aarch64-custom-time-trigger.xml
#
# Related PRs that move tier1 jobs between backends (must align after merge):
#   - #14629: move longevity-150gb-asymmetric to GCE (12x n2-highmem-4)
#   - #14594: replace Azure 1TB 5-day test with AWS i8g alternative

cron_triggers:
  - schedule: "00 06 * * 6"  # Saturday 6am UTC
    params:
      scylla_version: "{branch}:latest"
      job_folder: "scylla-master"
      labels_selector: "weekly"
      requested_by_user: "pehala"

defaults:
  provision_type: "on_demand"
  post_behavior_db_nodes: "destroy"
  post_behavior_loader_nodes: "destroy"
  post_behavior_monitor_nodes: "destroy"
  stress_duration: "1440"
  availability_zone: "c"

jobs:
  # ==================== AWS x86 ====================

  - job_name: "tier1/gemini-1tb-10h-test"
    backend: "aws"
    region: "eu-west-1"
    labels:
      - "weekly"
    exclude_versions: ["2024.1", "2025.1", "2025.4", "2026.1"]

  - job_name: "tier1/longevity-mv-si-4days-streaming-test"
    backend: "aws"
    region: "eu-west-1"
    labels:
      - "weekly"

  - job_name: "tier1/longevity-schema-topology-changes-12h-test"
    backend: "aws"
    region: "eu-west-1"
    labels:
      - "weekly"

  - job_name: "tier1/scale-schema-5000-tables-latte-test"
    backend: "aws"
    region: "eu-west-1"
    labels:
      - "weekly"
    exclude_versions: ["2024.1", "2025.1", "2025.4", "2026.1"]

  - job_name: "tier1/longevity-twcs-48h-test"
    backend: "aws"
    region: "us-east-1"
    labels:
      - "weekly"

  - job_name: "tier1/longevity-50gb-3days-test"
    backend: "aws"
    region: "eu-west-1"
    labels:
      - "weekly"
    include_versions: ["2024.1", "2025.1", "2025.4", "2026.1"]

  - job_name: "tier1/longevity-150gb-asymmetric-cluster-12h-test"
    backend: "aws"
    region: "us-east-1"
    labels:
      - "weekly"

  - job_name: "tier1/elasticity-90-percent-with-nemesis-test"
    backend: "aws"
    region: "us-east-1"
    labels:
      - "weekly"
    exclude_versions: ["2024.1", "2025.1", "2025.4", "2026.1"]

  - job_name: "tier1/longevity-multidc-schema-topology-changes-12h-test"
    backend: "aws"
    region: '["eu-west-1", "eu-west-2"]'
    params:
      availability_zone: "a,b,c"
    labels:
      - "weekly"

  # ==================== AWS aarch64 ====================

  - job_name: "tier1/longevity-twcs-48h-test"
    backend: "aws"
    region: "us-east-1"
    labels:
      - "weekly"
      - "aarch64"
    exclude_versions: ["2024.1", "2025.1"]

  - job_name: "tier1/longevity-2tb-5days-test"
    backend: "aws"
    region: "eu-west-1"
    labels:
      - "weekly"
      - "aarch64"
    exclude_versions: ["2024.1", "2025.1", "2025.4", "2026.1", "2026.2"]

  - job_name: "tier1/elasticity-90-percent-with-nemesis-test"
    backend: "aws"
    region: "us-east-1"
    labels:
      - "weekly"
      - "aarch64"
    exclude_versions: ["2024.1", "2025.1", "2025.4", "2026.1"]

  # ==================== GCE ====================

  - job_name: "tier1/longevity-large-partition-200k-pks-4days-gce-test"
    backend: "gce"
    region: "us-east1"
    params:
      availability_zone: ""
    labels:
      - "weekly"

  # ==================== Azure ====================

  - job_name: "tier1/longevity-1tb-5days-azure-test"
    backend: "azure"
    region: "eastus"
    params:
      availability_zone: ""
    labels:
      - "weekly"
    include_versions: ["2024.1", "2025.1", "2025.4", "2026.1", "2026.2"]
