  # ===========================================================================
  # Image-based rolling upgrades (AMI / GCE / Azure)
  # ===========================================================================

  - job_name: "rolling-upgrade/rolling-upgrade-ami-test"
    backend: "aws"
    region: "eu-west-1"
    labels:
      - "weekly"
