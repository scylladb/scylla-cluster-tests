id: no-hardcoded-secrets
message: "Security Warning: Potential hardcoded secret detected. Use the Jenkins credentials binding mechanism instead."
severity: warning
language: groovy
rule:
  all:
    # 1. Look for assignments
    - pattern: $VAR = $VAL
    # 2. But ignore it if they are already using credentials()
    - not:
        pattern: $VAR = credentials($$$ARGS)
constraints:
  VAR:
    regex: "(?i)(password|secret|token|apikey|passwd)"
